name: Agentic Doctor

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  doctor-strict:
    name: Run agentic doctor-strict
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Ensure scripts are executable
        run: |
          chmod +x scripts/agentic/agentic-gen.sh
          find scripts/agentic -type f -name "*.py" -exec chmod +x {} \;

      - name: Run doctor-strict
        run: scripts/agentic/agentic-gen.sh doctor-strict
